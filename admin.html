<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AviMart Admin Panel 2026</title>
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- Fonts & Icons 2026 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --secondary: #ec4899;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --dark: #0f172a;
      --light: #f8fafc;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
      --shadow-2xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);
      --glass: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.05);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow-x: hidden;
      padding: 20px 0;
    }

    /* Admin Container */
    #admin-container {
      width: 100%;
      max-width: 480px;
      background: var(--light);
      border-radius: 40px;
      overflow: hidden;
      box-shadow: var(--shadow-2xl);
      margin: 20px auto;
      min-height: 90vh;
    }

    /* Custom Scrollbar */
    #admin-container::-webkit-scrollbar {
      width: 4px;
    }

    #admin-container::-webkit-scrollbar-thumb {
      background: var(--primary-light);
      border-radius: 8px;
    }

    /* Admin Header */
    .admin-header {
      background: linear-gradient(145deg, var(--primary), var(--secondary));
      padding: 30px 25px;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .admin-header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200px;
      height: 200px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
    }

    .admin-header::after {
      content: '';
      position: absolute;
      bottom: -50%;
      left: -50%;
      width: 200px;
      height: 200px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
    }

    .admin-header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 5px;
      position: relative;
      z-index: 1;
    }

    .admin-header p {
      font-size: 0.95rem;
      opacity: 0.9;
      position: relative;
      z-index: 1;
    }

    .admin-header i {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 3rem;
      opacity: 0.2;
      z-index: 0;
    }

    /* Admin Content */
    .admin-content {
      padding: 20px;
    }

    /* Login Section */
    .login-section {
      background: white;
      border-radius: 30px;
      padding: 30px 25px;
      box-shadow: var(--shadow-lg);
      margin: 20px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-header h2 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(145deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .login-header p {
      color: var(--gray-500);
    }

    /* Admin Panel */
    .admin-panel {
      display: none;
    }

    /* Dashboard Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      border-radius: 25px;
      padding: 20px;
      box-shadow: var(--shadow-md);
      transition: all 0.3s ease;
      border: 1px solid var(--gray-100);
    }

    .stat-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }

    .stat-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(145deg, var(--primary-light), var(--primary));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
    }

    .stat-icon i {
      font-size: 1.8rem;
      color: white;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 5px;
    }

    .stat-label {
      color: var(--gray-500);
      font-size: 0.85rem;
      font-weight: 500;
    }

    /* Section Headers */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 0 5px;
    }

    .section-header h3 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--dark);
    }

    .section-header i {
      color: var(--primary);
      font-size: 1.2rem;
    }

    /* Category Cards */
    .categories-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 30px;
    }

    .category-chip {
      background: var(--gray-100);
      padding: 10px 20px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--gray-200);
      transition: all 0.3s ease;
    }

    .category-chip span {
      color: var(--gray-700);
      font-weight: 500;
    }

    .category-chip i {
      color: var(--danger);
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.3s ease;
    }

    .category-chip i:hover {
      opacity: 1;
    }

    .category-chip:hover {
      background: var(--gray-200);
      transform: translateY(-2px);
    }

    /* Form Cards */
    .form-card {
      background: white;
      border-radius: 30px;
      padding: 25px;
      box-shadow: var(--shadow-md);
      margin-bottom: 30px;
      border: 1px solid var(--gray-100);
    }

    .form-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .form-title i {
      font-size: 1.5rem;
      color: var(--primary);
    }

    .form-title h4 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--dark);
    }

    .input-group {
      margin-bottom: 15px;
      position: relative;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--gray-700);
      font-size: 0.9rem;
    }

    .input-group input,
    .input-group select,
    .input-group textarea {
      width: 100%;
      padding: 15px 20px;
      border: 2px solid var(--gray-200);
      border-radius: 20px;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      background: white;
    }

    .input-group input:focus,
    .input-group select:focus,
    .input-group textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.1);
      outline: none;
    }

    /* Image Upload Area */
    .image-upload-area {
      border: 2px dashed var(--gray-300);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      margin-bottom: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .image-upload-area:hover {
      border-color: var(--primary);
      background: var(--gray-50);
    }

    .image-upload-area i {
      font-size: 3rem;
      color: var(--gray-400);
      margin-bottom: 10px;
    }

    .image-upload-area p {
      color: var(--gray-500);
      font-size: 0.9rem;
    }

    .image-preview {
      width: 100%;
      height: 200px;
      border-radius: 20px;
      object-fit: cover;
      margin-bottom: 15px;
      display: none;
    }

    /* Buttons */
    .btn {
      padding: 15px 25px;
      border: none;
      border-radius: 25px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
    }

    .btn-primary {
      background: linear-gradient(145deg, var(--primary), var(--secondary));
      color: white;
      box-shadow: var(--shadow-md);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn-secondary {
      background: var(--gray-100);
      color: var(--gray-700);
      border: 1px solid var(--gray-200);
    }

    .btn-secondary:hover {
      background: var(--gray-200);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-sm {
      padding: 10px 20px;
      font-size: 0.85rem;
    }

    /* Products Grid */
    .products-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 20px;
    }

    .product-card {
      background: white;
      border-radius: 25px;
      padding: 15px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--gray-100);
      transition: all 0.3s ease;
      position: relative;
    }

    .product-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }

    .product-image {
      width: 100%;
      height: 120px;
      background: var(--gray-100);
      border-radius: 15px;
      margin-bottom: 12px;
      object-fit: cover;
    }

    .product-title {
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 5px;
      font-size: 0.95rem;
    }

    .product-price {
      color: var(--primary);
      font-weight: 800;
      margin-bottom: 5px;
    }

    .product-category {
      font-size: 0.75rem;
      color: var(--gray-500);
      margin-bottom: 10px;
    }

    .product-actions {
      display: flex;
      gap: 8px;
    }

    .product-actions button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 15px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-edit {
      background: var(--warning);
      color: white;
    }

    .btn-delete {
      background: var(--danger);
      color: white;
    }

    /* Orders List */
    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .order-card {
      background: white;
      border-radius: 25px;
      padding: 20px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--gray-100);
    }

    .order-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .order-id {
      font-weight: 700;
      color: var(--dark);
    }

    .order-status {
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .status-placed {
      background: var(--warning);
      color: white;
    }

    .status-confirmed {
      background: var(--primary);
      color: white;
    }

    .status-shipped {
      background: var(--secondary);
      color: white;
    }

    .status-delivered {
      background: var(--success);
      color: white;
    }

    .status-cancelled {
      background: var(--danger);
      color: white;
    }

    .order-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 15px;
    }

    .order-detail-item {
      font-size: 0.9rem;
    }

    .order-detail-item strong {
      display: block;
      color: var(--gray-500);
      font-size: 0.75rem;
      margin-bottom: 3px;
    }

    .order-detail-item span {
      color: var(--dark);
      font-weight: 600;
    }

    .tracking-form {
      display: grid;
      gap: 10px;
      margin-top: 15px;
    }

    .tracking-form input {
      padding: 10px 15px;
      border: 1px solid var(--gray-200);
      border-radius: 15px;
      font-size: 0.9rem;
    }

    /* Settings Card */
    .settings-card {
      background: white;
      border-radius: 30px;
      padding: 25px;
      box-shadow: var(--shadow-md);
    }

    /* Loading Spinner */
    .loading-spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--dark);
      color: white;
      padding: 15px 25px;
      border-radius: 30px;
      font-size: 0.95rem;
      box-shadow: var(--shadow-xl);
      z-index: 9999;
      animation: slideUp 0.3s ease;
      max-width: 90%;
      text-align: center;
    }

    @keyframes slideUp {
      from { bottom: 20px; opacity: 0; }
      to { bottom: 30px; opacity: 1; }
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      background: var(--gray-50);
      border-radius: 30px;
    }

    .empty-state i {
      font-size: 3rem;
      color: var(--gray-300);
      margin-bottom: 15px;
    }

    .empty-state h4 {
      color: var(--gray-600);
      margin-bottom: 10px;
    }

    .empty-state p {
      color: var(--gray-400);
      font-size: 0.9rem;
    }

    /* Logout Button */
    .logout-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 10;
    }

    .logout-btn:hover {
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div id="admin-container">
    <!-- Admin Header -->
    <div class="admin-header">
      <h1>AviMart</h1>
      <p>Admin Panel 2026</p>
      <i class="fas fa-store"></i>
    </div>

    <div class="admin-content">
      <!-- Login Section -->
      <div id="loginSection" class="login-section">
        <div class="login-header">
          <h2>Admin Login</h2>
          <p>Enter your credentials</p>
        </div>
        
        <div class="input-group">
          <label><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="adminEmail" placeholder="avi@app.com">
        </div>
        
        <div class="input-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="adminPass" placeholder="••••••••">
        </div>
        
        <button class="btn btn-primary" id="adminLoginBtn">
          <i class="fas fa-sign-in-alt"></i> Login to Dashboard
        </button>
      </div>

      <!-- Admin Panel -->
      <div id="adminPanel" class="admin-panel">
        <button class="logout-btn" id="logoutAdmin">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>

        <!-- Stats Dashboard -->
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card">
            <div class="stat-icon">
              <i class="fas fa-box"></i>
            </div>
            <div class="stat-value" id="totalProducts">0</div>
            <div class="stat-label">Total Products</div>
          </div>
          
          <div class="stat-card">
            <div class="stat-icon">
              <i class="fas fa-tags"></i>
            </div>
            <div class="stat-value" id="totalCategories">0</div>
            <div class="stat-label">Categories</div>
          </div>
          
          <div class="stat-card">
            <div class="stat-icon">
              <i class="fas fa-shopping-cart"></i>
            </div>
            <div class="stat-value" id="totalOrders">0</div>
            <div class="stat-label">Total Orders</div>
          </div>
          
          <div class="stat-card">
            <div class="stat-icon">
              <i class="fas fa-users"></i>
            </div>
            <div class="stat-value" id="totalUsers">0</div>
            <div class="stat-label">Users</div>
          </div>
        </div>

        <!-- Categories Section -->
        <div class="section-header">
          <h3><i class="fas fa-tags"></i> Categories</h3>
          <i class="fas fa-plus-circle" style="font-size: 1.5rem; color: var(--primary); cursor: pointer;" onclick="showAddCategory()"></i>
        </div>

        <div class="form-card" id="addCategoryForm" style="display: none;">
          <div class="form-title">
            <i class="fas fa-plus-circle"></i>
            <h4>Add New Category</h4>
          </div>
          
          <div class="input-group">
            <label>Category Name</label>
            <input type="text" id="catName" placeholder="e.g., Electronics">
          </div>
          
          <div class="input-group">
            <label>Category Icon</label>
            <select id="catIcon">
              <option value="mobile-alt">📱 Electronics</option>
              <option value="tshirt">👕 Fashion</option>
              <option value="home">🏠 Home</option>
              <option value="spa">💄 Beauty</option>
              <option value="futbol">⚽ Sports</option>
              <option value="book">📚 Books</option>
              <option value="gamepad">🎮 Gaming</option>
              <option value="utensils">🍳 Kitchen</option>
            </select>
          </div>
          
          <button class="btn btn-primary" id="addCategoryBtn">
            <i class="fas fa-save"></i> Save Category
          </button>
        </div>

        <div class="categories-list" id="categoriesList">
          <!-- Categories will be loaded here -->
        </div>

        <!-- Add Product Section -->
        <div class="section-header">
          <h3><i class="fas fa-plus-circle"></i> Add Product</h3>
        </div>

        <div class="form-card">
          <div class="form-title">
            <i class="fas fa-box"></i>
            <h4>Product Details</h4>
          </div>
          
          <div class="image-upload-area" id="imageUploadArea">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>Click to upload product image</p>
            <p style="font-size: 0.8rem;">Supports: JPG, PNG, WEBP</p>
            <input type="file" id="imageInput" style="display: none;" accept="image/*">
          </div>
          
          <img id="imagePreview" class="image-preview" src="" alt="Preview">
          
          <div class="input-group">
            <label>Product Name</label>
            <input type="text" id="prodName" placeholder="e.g., iPhone 15 Pro Max">
          </div>
          
          <div class="input-group">
            <label>Price (₹)</label>
            <input type="number" id="prodPrice" placeholder="e.g., 99900">
          </div>
          
          <div class="input-group">
            <label>Discount %</label>
            <input type="number" id="prodDiscount" placeholder="e.g., 10" value="0" min="0" max="100">
          </div>
          
          <div class="input-group">
            <label>Category</label>
            <select id="prodCategory">
              <option value="">Select Category</option>
            </select>
          </div>
          
          <div class="input-group">
            <label>Description</label>
            <textarea id="prodDescription" rows="3" placeholder="Product description..."></textarea>
          </div>
          
          <div class="input-group">
            <label>Stock Quantity</label>
            <input type="number" id="prodStock" placeholder="e.g., 50" value="10" min="0">
          </div>
          
          <input type="hidden" id="prodImageUrl">
          <input type="hidden" id="editingProductId">
          
          <button class="btn btn-primary" id="addProductBtn">
            <i class="fas fa-save"></i> Add Product
          </button>
        </div>

        <!-- Products List -->
        <div class="section-header">
          <h3><i class="fas fa-boxes"></i> Products</h3>
        </div>

        <div class="products-grid" id="productsGrid">
          <!-- Products will be loaded here -->
        </div>

        <!-- Orders Section -->
        <div class="section-header">
          <h3><i class="fas fa-truck"></i> Orders</h3>
        </div>

        <div class="orders-list" id="ordersList">
          <!-- Orders will be loaded here -->
        </div>

        <!-- Settings Section -->
        <div class="section-header">
          <h3><i class="fas fa-cog"></i> Settings</h3>
        </div>

        <div class="settings-card">
          <div class="form-title">
            <i class="fas fa-whatsapp"></i>
            <h4>WhatsApp Settings</h4>
          </div>
          
          <div class="input-group">
            <label>Admin WhatsApp Number (with country code)</label>
            <input type="tel" id="waNumber" placeholder="e.g., 919876543210">
          </div>
          
          <button class="btn btn-primary" id="updateWA">
            <i class="fas fa-save"></i> Save Settings
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyC7LQIiwUkr-bwIWoPkEL4J1IJLkmqIv9U",
      authDomain: "avimart-3264c.firebaseapp.com",
      databaseURL: "https://avimart-3264c-default-rtdb.firebaseio.com",
      projectId: "avimart-3264c",
      storageBucket: "avimart-3264c.firebasestorage.app",
      messagingSenderId: "445593457856",
      appId: "1:445593457856:web:ebc565a85c8eecf58c4925"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    // Admin UID
    const ADMIN_UID = "GWakAyOgQ5Y8TE931RNKLy7XEnm1";

    // DOM Elements
    const loginSection = document.getElementById('loginSection');
    const adminPanel = document.getElementById('adminPanel');

    // Toast Function
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      toast.style.background = type === 'error' ? '#ef4444' : '#1f2937';
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.remove();
      }, 3000);
    }

    // Auth State Observer
    auth.onAuthStateChanged(user => {
      if (user && user.uid === ADMIN_UID) {
        loginSection.style.display = 'none';
        adminPanel.style.display = 'block';
        loadCategories();
        loadProducts();
        loadOrders();
        loadStats();
        loadSettings();
      } else {
        loginSection.style.display = 'block';
        adminPanel.style.display = 'none';
        if (user) auth.signOut();
      }
    });

    // Admin Login
    document.getElementById('adminLoginBtn').addEventListener('click', () => {
      const email = document.getElementById('adminEmail').value;
      const pass = document.getElementById('adminPass').value;

      if (!email || !pass) {
        showToast('Please fill all fields', 'error');
        return;
      }

      auth.signInWithEmailAndPassword(email, pass)
        .then(() => {
          showToast('Login successful!');
        })
        .catch(err => showToast(err.message, 'error'));
    });

    // Logout
    document.getElementById('logoutAdmin').addEventListener('click', () => {
      auth.signOut();
      showToast('Logged out');
    });

    // Show Add Category Form
    window.showAddCategory = function() {
      const form = document.getElementById('addCategoryForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    };

    // Add Category
    document.getElementById('addCategoryBtn').addEventListener('click', () => {
      const name = document.getElementById('catName').value;
      const icon = document.getElementById('catIcon').value;

      if (!name) {
        showToast('Enter category name', 'error');
        return;
      }

      db.ref('categories').push({
        name: name,
        icon: icon,
        createdAt: Date.now()
      })
      .then(() => {
        showToast('Category added!');
        document.getElementById('catName').value = '';
        document.getElementById('addCategoryForm').style.display = 'none';
      })
      .catch(err => showToast(err.message, 'error'));
    });

    // Load Categories
    function loadCategories() {
      const categoriesList = document.getElementById('categoriesList');
      const categorySelect = document.getElementById('prodCategory');
      
      db.ref('categories').on('value', snapshot => {
        const categories = snapshot.val();
        categoriesList.innerHTML = '';
        categorySelect.innerHTML = '<option value="">Select Category</option>';
        
        if (categories) {
          Object.keys(categories).forEach(key => {
            const cat = categories[key];
            
            // Category Chip
            const chip = document.createElement('div');
            chip.className = 'category-chip';
            chip.innerHTML = `
              <i class="fas fa-${cat.icon || 'tag'}"></i>
              <span>${cat.name}</span>
              <i class="fas fa-times" onclick="deleteCategory('${key}')"></i>
            `;
            categoriesList.appendChild(chip);
            
            // Category Option
            const option = document.createElement('option');
            option.value = key;
            option.textContent = cat.name;
            categorySelect.appendChild(option);
          });
        }
      });
    }

    // Delete Category
    window.deleteCategory = function(categoryId) {
      if (confirm('Delete this category?')) {
        db.ref('categories/' + categoryId).remove()
          .then(() => showToast('Category deleted'))
          .catch(err => showToast(err.message, 'error'));
      }
    };

    // Image Upload
    const imageUploadArea = document.getElementById('imageUploadArea');
    const imageInput = document.getElementById('imageInput');
    const imagePreview = document.getElementById('imagePreview');

    imageUploadArea.addEventListener('click', () => {
      imageInput.click();
    });

    imageInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      // Show preview
      const reader = new FileReader();
      reader.onload = (e) => {
        imagePreview.src = e.target.result;
        imagePreview.style.display = 'block';
      };
      reader.readAsDataURL(file);

      // Upload to ImgBB
      showToast('Uploading image...');
      const formData = new FormData();
      formData.append('image', file);
      
      try {
        const response = await fetch('https://api.imgbb.com/1/upload?key=d168143e8512af5b9298b379acd7bd67', {
          method: 'POST',
          body: formData
        });
        
        const data = await response.json();
        if (data.data.url) {
          document.getElementById('prodImageUrl').value = data.data.url;
          showToast('Image uploaded!');
        }
      } catch (err) {
        showToast('Upload failed', 'error');
      }
    });

    // Add/Edit Product
    document.getElementById('addProductBtn').addEventListener('click', () => {
      const name = document.getElementById('prodName').value;
      const price = document.getElementById('prodPrice').value;
      const discount = document.getElementById('prodDiscount').value;
      const category = document.getElementById('prodCategory').value;
      const description = document.getElementById('prodDescription').value;
      const stock = document.getElementById('prodStock').value;
      const image = document.getElementById('prodImageUrl').value;
      const editId = document.getElementById('editingProductId').value;

      if (!name || !price || !category || !image) {
        showToast('Fill required fields', 'error');
        return;
      }

      const productData = {
        name: name,
        price: Number(price),
        discount: Number(discount),
        category: category,
        description: description || '',
        stock: Number(stock),
        image: image,
        updatedAt: Date.now()
      };

      if (editId) {
        // Update existing product
        db.ref('products/' + editId).update(productData)
          .then(() => {
            showToast('Product updated!');
            clearProductForm();
          })
          .catch(err => showToast(err.message, 'error'));
      } else {
        // Add new product
        productData.createdAt = Date.now();
        db.ref('products').push(productData)
          .then(() => {
            showToast('Product added!');
            clearProductForm();
          })
          .catch(err => showToast(err.message, 'error'));
      }
    });

    // Clear Product Form
    function clearProductForm() {
      document.getElementById('prodName').value = '';
      document.getElementById('prodPrice').value = '';
      document.getElementById('prodDiscount').value = '0';
      document.getElementById('prodCategory').value = '';
      document.getElementById('prodDescription').value = '';
      document.getElementById('prodStock').value = '10';
      document.getElementById('prodImageUrl').value = '';
      document.getElementById('imagePreview').style.display = 'none';
      document.getElementById('imagePreview').src = '';
      document.getElementById('editingProductId').value = '';
      document.getElementById('addProductBtn').innerHTML = '<i class="fas fa-save"></i> Add Product';
    }

    // Load Products
    function loadProducts() {
      const productsGrid = document.getElementById('productsGrid');
      
      db.ref('products').on('value', snapshot => {
        const products = snapshot.val();
        productsGrid.innerHTML = '';
        
        if (products) {
          Object.keys(products).forEach(key => {
            const p = products[key];
            
            db.ref('categories/' + p.category).once('value', catSnap => {
              const category = catSnap.val();
              
              const card = document.createElement('div');
              card.className = 'product-card';
              card.innerHTML = `
                <img src="${p.image || 'https://via.placeholder.com/200'}" class="product-image" alt="${p.name}">
                <div class="product-title">${p.name}</div>
                <div class="product-price">₹${p.price}</div>
                <div class="product-category">${category?.name || 'Uncategorized'}</div>
                <div class="product-actions">
                  <button class="btn-edit" onclick="editProduct('${key}')">
                    <i class="fas fa-edit"></i>
                  </button>
                  <button class="btn-delete" onclick="deleteProduct('${key}')">
                    <i class="fas fa-trash"></i>
                  </button>
                </div>
              `;
              productsGrid.appendChild(card);
            });
          });
        } else {
          productsGrid.innerHTML = `
            <div class="empty-state" style="grid-column: 1/-1;">
              <i class="fas fa-box-open"></i>
              <h4>No Products</h4>
              <p>Add your first product</p>
            </div>
          `;
        }
      });
    }

    // Edit Product
    window.editProduct = function(productId) {
      db.ref('products/' + productId).once('value', snapshot => {
        const p = snapshot.val();
        
        document.getElementById('prodName').value = p.name;
        document.getElementById('prodPrice').value = p.price;
        document.getElementById('prodDiscount').value = p.discount || 0;
        document.getElementById('prodCategory').value = p.category || '';
        document.getElementById('prodDescription').value = p.description || '';
        document.getElementById('prodStock').value = p.stock || 10;
        document.getElementById('prodImageUrl').value = p.image || '';
        document.getElementById('imagePreview').src = p.image || '';
        document.getElementById('imagePreview').style.display = p.image ? 'block' : 'none';
        document.getElementById('editingProductId').value = productId;
        document.getElementById('addProductBtn').innerHTML = '<i class="fas fa-save"></i> Update Product';
        
        // Scroll to form
        document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth' });
      });
    };

    // Delete Product
    window.deleteProduct = function(productId) {
      if (confirm('Delete this product?')) {
        db.ref('products/' + productId).remove()
          .then(() => showToast('Product deleted'))
          .catch(err => showToast(err.message, 'error'));
      }
    };

    // Load Orders
    function loadOrders() {
      const ordersList = document.getElementById('ordersList');
      
      db.ref('orders').orderByChild('timestamp').limitToLast(20).on('value', snapshot => {
        const orders = snapshot.val();
        ordersList.innerHTML = '';
        
        if (orders) {
          const sortedOrders = Object.entries(orders).reverse();
          
          sortedOrders.forEach(([key, order]) => {
            const statusClass = `status-${order.status || 'placed'}`;
            
            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
              <div class="order-header">
                <span class="order-id">#${key.slice(-6)}</span>
                <span class="order-status ${statusClass}">${order.status || 'placed'}</span>
              </div>
              
              <div class="order-details">
                <div class="order-detail-item">
                  <strong>Customer</strong>
                  <span>${order.customerName || 'N/A'}</span>
                </div>
                <div class="order-detail-item">
                  <strong>Product</strong>
                  <span>${order.product || 'N/A'}</span>
                </div>
                <div class="order-detail-item">
                  <strong>Price</strong>
                  <span>₹${order.price || 0}</span>
                </div>
                <div class="order-detail-item">
                  <strong>Phone</strong>
                  <span>${order.phone || 'N/A'}</span>
                </div>
              </div>
              
              <div class="tracking-form">
                <input type="text" id="status-${key}" placeholder="Status" value="${order.status || ''}">
                <input type="text" id="courier-${key}" placeholder="Courier Company" value="${order.courier || ''}">
                <input type="text" id="trackingId-${key}" placeholder="Tracking ID" value="${order.trackingId || ''}">
                <input type="text" id="trackingLink-${key}" placeholder="Tracking Link" value="${order.trackingLink || ''}">
                <button class="btn btn-primary btn-sm" onclick="updateOrder('${key}')">
                  <i class="fas fa-sync"></i> Update Tracking
                </button>
              </div>
            `;
            
            ordersList.appendChild(card);
          });
        } else {
          ordersList.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-truck"></i>
              <h4>No Orders</h4>
              <p>Orders will appear here</p>
            </div>
          `;
        }
      });
    }

    // Update Order
    window.updateOrder = function(orderId) {
      const status = document.getElementById(`status-${orderId}`).value;
      const courier = document.getElementById(`courier-${orderId}`).value;
      const trackingId = document.getElementById(`trackingId-${orderId}`).value;
      const trackingLink = document.getElementById(`trackingLink-${orderId}`).value;
      
      db.ref('orders/' + orderId).update({
        status: status,
        courier: courier,
        trackingId: trackingId,
        trackingLink: trackingLink,
        updatedAt: Date.now()
      })
      .then(() => showToast('Order updated!'))
      .catch(err => showToast(err.message, 'error'));
    };

    // Load Stats
    function loadStats() {
      // Total Products
      db.ref('products').on('value', snapshot => {
        document.getElementById('totalProducts').textContent = snapshot.numChildren();
      });
      
      // Total Categories
      db.ref('categories').on('value', snapshot => {
        document.getElementById('totalCategories').textContent = snapshot.numChildren();
      });
      
      // Total Orders
      db.ref('orders').on('value', snapshot => {
        document.getElementById('totalOrders').textContent = snapshot.numChildren();
      });
      
      // Total Users
      db.ref('users').on('value', snapshot => {
        document.getElementById('totalUsers').textContent = snapshot.numChildren();
      });
    }

    // Load Settings
    function loadSettings() {
      db.ref('settings/adminWhatsApp').once('value', snapshot => {
        document.getElementById('waNumber').value = snapshot.val() || '';
      });
    }

    // Update WhatsApp
    document.getElementById('updateWA').addEventListener('click', () => {
      const wa = document.getElementById('waNumber').value;
      
      db.ref('settings').update({
        adminWhatsApp: wa
      })
      .then(() => showToast('Settings saved!'))
      .catch(err => showToast(err.message, 'error'));
    });
  </script>
</body>
</html>
